spring.application.name=workout-tracker-api

jwt.secret=${JWT_SECRET}
jwt.expiration-ms=3600000
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when_authorized
rate.limit.ip.capacity=10
rate.limit.user.capacity=100
rate.limit.cache.max-size=10000
server.forward-headers-strategy=NATIVE
server.tomcat.remoteip.internal-proxies=${LB_INTERNAL_PROXIES:127\\.\\d+\\.\\d+\\.\\d+|::1|0:0:0:0:0:0:0:1}
spring.datasource.url=jdbc:postgresql://localhost:${DB_PORT}/workout_tracker
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
